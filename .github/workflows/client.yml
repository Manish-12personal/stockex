name: Deploy Client

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/client.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Backup .env
        run: |
          if [ -f "$HOME/stockex/client/.env" ]; then
            cp "$HOME/stockex/client/.env" /tmp/client-env-backup
          fi
      - uses: actions/checkout@v4
      - name: Restore .env into repo
        run: |
          if [ -f /tmp/client-env-backup ]; then
            cp /tmp/client-env-backup ./client/.env
          fi
      - name: Install & build
        working-directory: ./client
        run: |
          npm ci || npm install
          npm run build
      - name: Deploy dist
        run: |
          rm -rf "$HOME/stockex/client/dist"
          cp -r ./client/dist "$HOME/stockex/client/"
      - name: Restore .env on server
        run: |
          if [ -f /tmp/client-env-backup ]; then
            cp /tmp/client-env-backup "$HOME/stockex/client/.env"
          fi
      - name: PM2 restart
        run: |
          cd "$HOME/stockex/client"
          pm2 restart stockex-frontend
          pm2 save
