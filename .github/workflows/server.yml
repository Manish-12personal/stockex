name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/server.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Backup .env
        run: |
          if [ -f "$HOME/stockex/server/.env" ]; then
            cp "$HOME/stockex/server/.env" /tmp/server-env-backup
          fi
      - uses: actions/checkout@v4
      - name: Restore .env
        run: |
          if [ -f /tmp/server-env-backup ]; then
            mkdir -p "$HOME/stockex/server"
            cp /tmp/server-env-backup "$HOME/stockex/server/.env"
          fi
      - name: Sync server
        run: |
          mkdir -p "$HOME/stockex/server"
          cp -a "${GITHUB_WORKSPACE}/server/." "$HOME/stockex/server/"
      - name: Install deps
        run: |
          cd "$HOME/stockex/server"
          npm ci --omit=dev || npm install --production
      - name: PM2 restart
        run: |
          cd "$HOME/stockex/server"
          pm2 restart stockex-api
          pm2 save
